<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#8c7248"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#0a0a0a"/>
  <!-- Camera aperture / lens abstraction -->
  <circle cx="32" cy="32" r="20" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="32" r="13" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Aperture blades -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="18" x2="46" y2="46" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="46" y1="18" x2="18" y2="46" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="url(#g1)"/>
</svg>
